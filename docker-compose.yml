services:
    postgres:
        image: postgres:16
        container_name: meat_store_postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: meat
            POSTGRES_PASSWORD: meatpassword
            POSTGRES_DB: meat_store
        ports:
            - '5432:5432'
        volumes:
            - meat_store_pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U meat -d meat_store']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    meat_store_pgdata:
